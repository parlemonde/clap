name: Test
on: [push]
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        strategy:
            fail-fast: false
            matrix:
                script: [typecheck, lint, build]
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'pnpm'
            - run: pnpm install
            - run: pnpm ${{ matrix.script }}
