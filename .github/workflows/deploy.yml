name: Deploy
on:
    workflow_run:
        workflows: [Build]
        types: [completed]
concurrency: production
jobs:
    check-deploy-paused:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        outputs:
            is-paused: ${{ steps.check.outputs.paused }}
        steps:
            - name: Check if deploys are paused
              id: check
              env:
                  DEV_PORTAL_URL: ${{ secrets.DEV_PORTAL_URL }}
                  DEV_PORTAL_DEPLOY_TOKEN: ${{ secrets.DEV_PORTAL_DEPLOY_TOKEN }}
              run: |
                  curl -fsS -H "Authorization: Bearer $DEV_PORTAL_DEPLOY_TOKEN" \
                      "$DEV_PORTAL_URL/api/apps/clap/deploy-state" > state.json
                  echo "paused=$(jq -r '.isDeploymentPaused' state.json)" >> "$GITHUB_OUTPUT"
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: check-deploy-paused
        if: needs.check-deploy-paused.outputs.is-paused == 'false'
        steps:
            - run: echo "Deploying sha ${{ github.sha }}"
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.sha }}
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'pnpm'
            - run: pnpm install
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}
            - name: Get IP address
              id: get-ip
              run: echo "ip=$(curl https://api.ipify.org)" >> "$GITHUB_OUTPUT"
            - name: Add Github Actions IP to security-group for Database
              run: aws ec2 authorize-security-group-ingress --group-name ${{ secrets.AWS_SECURITY_GROUP_NAME }} --protocol tcp --port 5432 --cidr ${{ steps.get-ip.outputs.ip }}/32
            - name: Migrate database
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
              run: pnpm tsx src/server/database/migrate.ts
            - name: Add Github Actions IP to security-group for SSH
              run: aws ec2 authorize-security-group-ingress --group-name ${{ secrets.AWS_SECURITY_GROUP_NAME }} --protocol tcp --port 22 --cidr ${{ steps.get-ip.outputs.ip }}/32
            - run: mkdir -p ~/.ssh/ && echo "${{secrets.SSH_KNOWN_HOSTS}}" > ~/.ssh/known_hosts
            - run: echo "${{ secrets.SSH_PRIVATE_KEY }}" > server-key.pem && chmod 600 server-key.pem
            - name: Deploy
              run: ssh -i server-key.pem ${{ secrets.SERVER_URL}} "exec sh ./deploy.sh ${{ github.sha }}"
            - name: Update live commit in dev-portal
              if: success()
              env:
                  DEV_PORTAL_URL: ${{ secrets.DEV_PORTAL_URL }}
                  DEV_PORTAL_DEPLOY_TOKEN: ${{ secrets.DEV_PORTAL_DEPLOY_TOKEN }}
              run: |
                  curl -fsS -X POST -H "Authorization: Bearer $DEV_PORTAL_DEPLOY_TOKEN" \
                      -H "Content-Type: application/json" \
                      -d "{\"liveCommitId\":\"${{ github.sha }}\"}" \
                      "$DEV_PORTAL_URL/api/apps/clap/deploy-state"
            - name: Revoke Github Actions IP from security-group for Database
              if: always()
              run: aws ec2 revoke-security-group-ingress --group-name ${{ secrets.AWS_SECURITY_GROUP_NAME }} --protocol tcp --port 5432 --cidr ${{ steps.get-ip.outputs.ip }}/32
            - name: Revoke Github Actions IP from security-group for SSH
              if: always()
              run: aws ec2 revoke-security-group-ingress --group-name ${{ secrets.AWS_SECURITY_GROUP_NAME }} --protocol tcp --port 22 --cidr ${{ steps.get-ip.outputs.ip }}/32
