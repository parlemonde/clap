version: "3.7"
services:
  postgres:
    image: postgres:16
    # set shared memory limit when using docker-compose
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: example
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data

  websockets:
    build:
      context: ./server-websockets
      dockerfile: Dockerfile
    command: server-websockets
    init: true
    ports:
      - "9000:9000"
